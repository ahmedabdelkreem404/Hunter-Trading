  </defs>
  <rect width="100" height="100" rx="20" fill="#0a0a0f"/>
  <text x="50" y="68" font-family="Arial Black, sans-serif" font-size="52" font-weight="bold" fill="url(#grad)" text-anchor="middle" filter="url(#glow)">H</text>
